<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>바짬들의 💩 달력</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="header-box">
    <div class="share-box" id="shareLinkBox">방을 만들면 여기에 공유 링크가 생성됩니다!</div>
    <div style="display:flex; gap:6px; justify-content:center;">
      <button class="primary" id="createRoomBtn">새로운 달력 방 만들기</button>
      <button class="secondary" id="copyLinkBtn">링크 복사</button>
    </div>
  </div>

  <div class="member-grid" id="memberGrid"></div>

  <div class="cal-controls">
    <h2 id="monthTitle">2026년 5월</h2>
    <div class="cal-btn-group">
      <button class="secondary" id="prevMonth">이전달</button>
      <button class="secondary" id="todayBtn">오늘</button>
      <button class="secondary" id="nextMonth">다음달</button>
      <button id="activeMemberBtn" style="color:white; font-size:12px; pointer-events:none;">나: 멤버 1</button>
    </div>
  </div>

  <div class="calendar" id="calendar"></div>

  <div class="modal" id="scheduleModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modalDateTitle">일정 상세</h3>
        <button class="secondary" id="closeModalBtn" style="padding:2px 8px; font-size:11px;">닫기</button>
      </div>
      
      <div class="modal-event-list" id="modalEventList"></div>
      
      <button id="modalHeartBtn" style="width:100%; padding:10px; font-weight:bold; font-size:13px; border-radius:10px; border:none; cursor:pointer;"></button>
      
      <div style="border-top: 1px dashed var(--border); padding-top: 8px; margin-top: 8px; display:flex; flex-direction:column; gap:6px;">
        <div style="font-size:11px; color:var(--text-muted); font-weight:bold;">이날 바빠용 일정 추가 (약속/알바 등)</div>
        <input type="text" id="scheduleTitle" placeholder="일정 제목을 입력하세요" />
        <textarea id="scheduleMemo" placeholder="상세 메모 (선택사항)"></textarea>
        <div class="modal-footer-btns" style="display:flex; gap:6px; margin-top:4px;">
          <button class="secondary" id="deleteScheduleBtn" style="flex:1; background:#fee2e2; color:#ef4444; border:none; padding:8px; border-radius:6px; cursor:pointer;">삭제</button>
          <button class="primary" id="saveScheduleBtn" style="flex:2; border:none; padding:8px; border-radius:6px; cursor:pointer;">일정 저장</button>
        </div>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
