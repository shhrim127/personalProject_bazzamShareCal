<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>bazzam 공유 달력</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div id="configWarning" class="header-box" style="display:none; color: #ef4444; font-weight: bold;"></div>

  <div class="header-box">
    <div id="shareLinkBox" class="share-box">방을 만들면 링크가 생성됩니다.</div>
    <div style="display: flex; gap: 8px; justify-content: center;">
      <button id="createRoomBtn" class="primary">새 공유방 만들기</button>
      <button id="copyLinkBtn" class="secondary">링크 복사</button>
    </div>
  </div>

  <div id="memberGrid" class="member-grid"></div>

  <div class="cal-controls">
    <h2 id="monthTitle">2026년 5월</h2>
    <div class="cal-btn-group">
      <button id="prevMonth" class="secondary">◀ 이전</button>
      <button id="todayBtn" class="secondary">오늘</button>
      <button id="nextMonth" class="secondary">다음 ▶</button>
    </div>
  </div>

  <div style="margin-bottom: 8px;">
    <button id="activeMemberBtn" style="width:100%; color:white; pointer-events:none;">나: 멤버 1</button>
  </div>

  <div id="calendar" class="calendar"></div>


  <div id="scheduleModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modalDateTitle">일정 상세</h3>
        <button id="closeModalBtn" style="background:none; font-size:20px; padding:0; cursor:pointer; color:#64748b;">&times;</button>
      </div>
      
      <div id="modalEventList" class="modal-event-list"></div>
      
      <button id="modalHeartBtn" style="width:100%; font-weight:700;">♡ 하트 누르기</button>
      
      <hr style="border:none; border-top:1px solid #e2e8f0; margin:4px 0;">
      
      <div style="display:flex; flex-direction:column; gap:8px;">
        <input type="text" id="scheduleTitle" placeholder="일정 제목 입력 (예: 약속)" maxlength="50">
        <textarea id="scheduleMemo" placeholder="상세 메모 입력 (선택사항)" maxlength="200"></textarea>
      </div>
      
      <div class="modal-footer-btns">
        <button id="deleteScheduleBtn" style="background:#fee2e2; color:#ef4444;">삭제</button>
        <button id="saveScheduleBtn" class="primary">저장하기</button>
      </div>
    </div>
  </div>

  <script>
    window.APP_CONFIG = {
      SUPABASE_URL: "https://xqtjfbobcwuowjrcybxo.supabase.co", 
      SUPABASE_ANON_KEY: "sb_publishable_d5Q0nRYspmvGsGue-j52oQ_rDYGMvjP"
    };
  </script>
  <script src="app.js"></script>
</body>
</html>
