<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>바짬들의 💩 달력</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="header-box">
    <div class="share-box" id="shareLinkBox">방을 만들면 여기에 공유 링크가 생성됩니다!</div>
    <div style="display:flex; gap:6px; justify-content:center;">
      <button class="primary" id="createRoomBtn">새로운 달력 방 만들기</button>
      <button class="secondary" id="copyLinkBtn">링크 복사</button>
    </div>
  </div>

  <div class="member-grid" id="memberGrid"></div>

  <div class="cal-controls">
    <h2 id="monthTitle">2026년 5월</h2>
    <div class="cal-btn-group">
      <button class="secondary" id="prevMonth">이전달</button>
      <button class="secondary" id="todayBtn">오늘</button>
      <button class="secondary" id="nextMonth">다음달</button>
    </div>
  </div>

  <div style="margin-bottom: 8px;">
    <button id="activeMemberBtn" style="width:100%; color:white; pointer-events:none; font-weight:bold;">나: 멤버 1</button>
  </div>

  <div class="calendar" id="calendar"></div>

  <div class="modal" id="scheduleModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modalDateTitle">일정 상세</h3>
        <button id="closeModalBtn" style="background:none; border:none; font-size:22px; cursor:pointer; color:#64748b; padding:0 4px;">&times;</button>
      </div>
      
      <div class="modal-event-list" id="modalEventList"></div>
      
      <button id="modalHeartBtn" style="width:100%; padding:12px; font-weight:bold; font-size:14px; border-radius:10px; border:none; cursor:pointer; margin:4px 0;"></button>
      
      <hr style="border:none; border-top:1px solid #e2e8f0; margin:6px 0;">
      
      <div style="display:flex; flex-direction:column; gap:6px;">
        <div style="font-size:11px; color:#64748b; font-weight:bold;">이날 바빠용 일정 추가 (약속/알바 등)</div>
        <input type="text" id="scheduleTitle" placeholder="일정 제목을 입력하세요 (예: 알바, 약속)" maxlength="50" />
        <textarea id="scheduleMemo" placeholder="상세 메모 (선택사항)" maxlength="200"></textarea>
        <div class="modal-footer-btns" style="display:flex; gap:6px; margin-top:2px;">
          <button id="deleteScheduleBtn" style="flex:1; background:#fee2e2; color:#ef4444; border:none; padding:10px; border-radius:8px; font-weight:bold; cursor:pointer;">삭제</button>
          <button class="primary" id="saveScheduleBtn" style="flex:2; padding:10px; border-radius:8px; font-weight:bold; cursor:pointer;">일정 저장</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    window.APP_CONFIG = {
      SUPABASE_URL: "https://xqtjfbobcwuowjrcybxo.supabase.co", 
      SUPABASE_ANON_KEY: "sb_publishable_d5Q0nRYspmvGsGue-j52oQ_rDYGMvjP"
    };
  </script>
  <script src="app.js"></script>
</body>
</html>
